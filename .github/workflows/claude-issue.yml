name: Claude issue worker

# General-purpose "hand this issue to Claude" workflow. Unlike the narrow
# checker-dispute reviewer, this one works a full feature/bug issue: it reads
# the issue, implements the change across the repo, runs the tests, and opens a
# PR that closes the issue.
#
# Two ways to trigger it — RESTRICTED TO THE REPO OWNER. Anyone may open
# issues, but only the owner can hand one to Claude (the checker-dispute
# workflow is separate and stays fully automatic):
#   * Add the  claude  label to an issue, OR
#   * Comment  @claude  on an issue.
#
# NOTE: label/mention-triggered workflows run from the DEFAULT branch, so this
# file must be merged to the default branch before the trigger will fire.
#
# Auth: same repo secret as the dispute workflow — set ONE of:
#   * CLAUDE_CODE_OAUTH_TOKEN  — from `claude setup-token` (uses your Claude
#     subscription), OR
#   * ANTHROPIC_API_KEY        — pay-as-you-go Anthropic API key.
#
# The actual Claude run lives in the reusable claude-worker.yml, which also
# handles the subscription's 5-hour usage limit: on a limit hit it saves
# progress and exits green, and claude-resume.yml (scheduled) continues the
# work after the limit window resets.

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

# Serialize all Claude runs (fresh + resumes) — they share one subscription
# budget, so parallel runs would just trip the limit for each other.
concurrency:
  group: claude-work
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  # Required to exchange CLAUDE_CODE_OAUTH_TOKEN via OIDC.
  id-token: write

jobs:
  work:
    # Owner-only: strangers may open issues, but only justbest23 can trigger a
    # Claude run (via the "claude" label or an @claude comment). Ignore comments
    # on pull requests (issue_comment fires for both).
    if: >-
      github.actor == 'justbest23' &&
      (
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude') ||
        (github.event_name == 'issue_comment' && !github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
      )
    uses: ./.github/workflows/claude-worker.yml
    with:
      issue_number: ${{ github.event.issue.number }}
    secrets: inherit
